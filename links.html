<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lesbiel — Links</title>
<meta name="description" content="Links do projeto Lesbiel — Arquivo e voz de mulheres lésbicas e bissexuais.">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📖</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=General+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">
<style>
  :root {
    --verde: #264403;
    --verde-mid: #3d6a05;
    --verde-light: #64840a;
    --bege: #e9f2dd;
    --bege-mid: #d4e8bb;
    --bege-dark: #c2dca4;
    --preto: #0a0a0a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--verde);
    color: var(--bege);
    font-family: 'General Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 4rem 1.5rem;
  }
  .links-container {
    max-width: 420px;
    width: 100%;
    text-align: center;
  }
  .links-logo {
    font-size: 2.5rem;
    font-weight: 700;
    letter-spacing: -0.05em;
    margin-bottom: 0.5rem;
  }
  .links-logo span { font-weight: 300; font-style: italic; }
  .links-subtitle {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    opacity: 0.6;
    margin-bottom: 3rem;
  }
  .links-list {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }
  .link-item {
    display: flex;
    align-items: center;
    gap: 1rem;
    background: rgba(233,242,221,0.08);
    border: 1px solid rgba(233,242,221,0.15);
    padding: 1rem 1.5rem;
    text-decoration: none;
    color: var(--bege);
    transition: background 0.3s, transform 0.2s;
    border-radius: 4px;
  }
  .link-item:hover {
    background: rgba(233,242,221,0.15);
    transform: translateY(-2px);
  }
  .link-icon {
    width: 20px;
    height: 20px;
    flex-shrink: 0;
    opacity: 0.7;
  }
  .link-label {
    font-size: 0.85rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .links-footer {
    margin-top: 3rem;
    font-size: 0.7rem;
    opacity: 0.4;
    letter-spacing: 0.04em;
  }
  .links-footer a {
    color: var(--bege);
    text-decoration: none;
  }
</style>
</head>
<body>

<div class="links-container">
  <div class="links-logo">Lesb<span>iel</span></div>
  <p class="links-subtitle">Arquivo e voz de mulheres lésbicas e bissexuais</p>

  <div class="links-list">
    <a href="https://biancacavsch.github.io/lesbiel" class="link-item">
      <svg class="link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
      <span class="link-label">Site Lesbiel</span>
    </a>

    <a href="#" class="link-item js-soon">
      <svg class="link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><circle cx="12" cy="17" r=".5"/></svg>
      <span class="link-label">Spotify — Episódios em áudio</span>
    </a>

    <a href="https://www.instagram.com/lesbiel" class="link-item" target="_blank" rel="noopener">
      <svg class="link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="5"/><circle cx="17.5" cy="6.5" r="1.5" fill="currentColor" stroke="none"/></svg>
      <span class="link-label">Instagram</span>
    </a>

    <a href="indicar.html" class="link-item">
      <svg class="link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 20h9M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
      <span class="link-label">Indicar uma autora</span>
    </a>
  </div>

  <p class="links-footer">
    <a href="https://biancacavsch.github.io/lesbiel">lesbiel.com.br</a>
  </p>
</div>

<script>
document.querySelectorAll('.js-soon').forEach(btn => {
  btn.addEventListener('click', function(e) {
    e.preventDefault();
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML = '<div class="modal-content"><button class="modal-close">×</button><h3 class="modal-title">Em breve</h3><p class="modal-desc">Este conteúdo estará disponível em breve.</p></div>';
    document.body.appendChild(overlay);
    overlay.querySelector('.modal-close').addEventListener('click', () => overlay.remove());
    overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
  });
});
</script>
<style>
.modal-overlay { position:fixed; inset:0; background:rgba(10,10,10,0.9); display:flex; align-items:center; justify-content:center; z-index:1000; }
.modal-content { background:var(--verde); padding:3rem; border-radius:4px; max-width:400px; width:90%; text-align:center; position:relative; }
.modal-close { position:absolute; top:1rem; right:1.5rem; background:none; border:none; color:var(--bege); font-size:2rem; cursor:pointer; opacity:0.6; }
.modal-close:hover { opacity:1; }
.modal-title { font-size:1.5rem; color:var(--bege); margin-bottom:0.5rem; letter-spacing:-0.03em; }
.modal-desc { color:var(--bege); opacity:0.7; font-size:0.9rem; line-height:1.6; }
</style>
</body>
</html>
