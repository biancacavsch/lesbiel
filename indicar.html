<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lesbiel — Indicar uma autora</title>
<meta name="description" content="Indique autoras e pesquisadoras para o arquivo Lesbiel.">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📖</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=General+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
.indicar-section {
  background: var(--verde);
  padding: 8rem 3rem;
  display: flex;
  justify-content: center;
}
.indicar-container {
  max-width: 560px;
  width: 100%;
}
.indicar-title {
  font-size: clamp(2rem, 4vw, 3rem);
  font-weight: 700;
  letter-spacing: -0.05em;
  color: var(--bege);
  line-height: 1;
  margin-bottom: 0.5rem;
}
.indicar-title span { font-weight: 300; font-style: italic; }
.indicar-desc {
  font-size: 0.9rem;
  color: var(--bege);
  opacity: 0.65;
  line-height: 1.7;
  margin-bottom: 3rem;
}
.indicar-form {
  display: flex;
  flex-direction: column;
  gap: 1.5rem;
}
.form-group {
  display: flex;
  flex-direction: column;
  gap: 0.4rem;
}
.form-group label {
  font-size: 0.72rem;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--bege);
  opacity: 0.7;
}
.form-group input,
.form-group textarea {
  background: rgba(233,242,221,0.08);
  border: 1px solid rgba(233,242,221,0.2);
  padding: 0.8rem 1rem;
  font-family: 'General Sans', sans-serif;
  font-size: 0.9rem;
  color: var(--bege);
  letter-spacing: var(--tracking);
  transition: border-color 0.2s;
}
.form-group input:focus,
.form-group textarea:focus {
  outline: none;
  border-color: var(--bege);
}
.form-group input::placeholder,
.form-group textarea::placeholder {
  color: var(--bege);
  opacity: 0.3;
}
.form-group textarea {
  min-height: 120px;
  resize: vertical;
}
.form-consent {
  display: flex;
  align-items: flex-start;
  gap: 0.75rem;
}
.form-consent input[type="checkbox"] {
  width: 18px;
  height: 18px;
  margin-top: 2px;
  flex-shrink: 0;
  accent-color: var(--bege);
}
.form-consent label {
  font-size: 0.78rem;
  color: var(--bege);
  opacity: 0.6;
  line-height: 1.5;
}
.form-consent a {
  color: var(--bege);
  text-decoration: underline;
  opacity: 0.8;
}
.honeypot {
  position: absolute;
  left: -9999px;
  opacity: 0;
  height: 0;
  width: 0;
  overflow: hidden;
}
.form-submit {
  background: var(--bege);
  color: var(--verde);
  border: none;
  padding: 0.9rem 2rem;
  font-family: 'General Sans', sans-serif;
  font-size: 0.85rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  cursor: pointer;
  transition: transform 0.2s, opacity 0.2s;
  align-self: flex-start;
}
.form-submit:hover {
  transform: translateY(-2px);
  opacity: 0.9;
}
.form-success {
  display: none;
  text-align: center;
  padding: 3rem 0;
}
.form-success h3 {
  font-size: 1.5rem;
  color: var(--bege);
  margin-bottom: 0.5rem;
  letter-spacing: -0.03em;
}
.form-success p {
  color: var(--bege);
  opacity: 0.7;
  font-size: 0.9rem;
  line-height: 1.6;
}
.form-back {
  display: inline-block;
  margin-top: 1.5rem;
  color: var(--bege);
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  text-decoration: none;
  opacity: 0.5;
  transition: opacity 0.2s;
}
.form-back:hover { opacity: 1; }
@media (max-width: 768px) {
  .indicar-section { padding: 4rem 1.5rem; }
}
</style>
</head>
<body>

<section class="indicar-section" aria-label="Indicar uma autora">
  <div class="indicar-container">
    <h1 class="indicar-title">Indique uma <span>autora</span></h1>
    <p class="indicar-desc">Sugira autoras e pesquisadoras para integrar o arquivo Lesbiel. Suas indicações nos ajudam a ampliar a voz de mulheres lésbicas e bissexuais na literatura.</p>

    <form class="indicar-form" id="indicarForm" action="https://api.web3forms.com/submit" method="POST">
      <input type="hidden" name="access_key" value="70994c59-586d-4209-ad87-db46564b49bd">
      <input type="hidden" name="subject" value="Nova indicação — Lesbiel">
      <input type="hidden" name="from_name" value="Lesbiel — Formulário de Indicação">

      <!-- Honeypot — campo oculto para bots -->
      <input type="text" name="website" class="honeypot" tabindex="-1" autocomplete="off">

      <!-- Timestamp para detectar envios instantâneos -->
      <input type="hidden" name="_timestamp" value="">

      <div class="form-group">
        <label for="nome">Seu nome</label>
        <input type="text" id="nome" name="nome" placeholder="Como podemos te chamar?" required maxlength="100">
      </div>

      <div class="form-group">
        <label for="email">Seu email</label>
        <input type="email" id="email" name="email" placeholder="Para contato, se necessário" required maxlength="200">
      </div>

      <div class="form-group">
        <label for="autora">Nome da autora indicada</label>
        <input type="text" id="autora" name="autora" placeholder="Nome completo da autora" required maxlength="200">
      </div>

      <div class="form-group">
        <label for="motivo">Por que essa autora deveria estar no Lesbiel?</label>
        <textarea id="motivo" name="motivo" placeholder="Compartilhe por que essa autora é relevante para o projeto..." required maxlength="2000"></textarea>
      </div>

      <div class="form-consent">
        <input type="checkbox" id="consent" name="consent" required>
        <label for="consent">Li e concordo com a <a href="privacidade.html">política de privacidade</a>. Meus dados serão utilizados apenas para contato sobre esta indicação e não serão compartilhados com terceiros.</label>
      </div>

      <button type="submit" class="form-submit">Enviar indicação</button>
    </form>

    <div class="form-success" id="formSuccess">
      <h3>Obrigada!</h3>
      <p>Sua indicação foi recebida. Avaliaremos a sugestão com carinho.</p>
      <a href="links.html" class="form-back">← Voltar</a>
    </div>
  </div>
</section>

<script>
const form = document.getElementById('indicarForm');
const success = document.getElementById('formSuccess');

// Timestamp anti-bots: se preenchido em menos de 3 segundos, é bot
document.querySelector('[name="_timestamp"]').value = Date.now();

form.addEventListener('submit', function(e) {
  // Honeypot check
  if (this.website.value) {
    e.preventDefault();
    return;
  }

  // Timestamp check: menos de 3 segundos = bot
  const elapsed = Date.now() - parseInt(document.querySelector('[name="_timestamp"]').value);
  if (elapsed < 3000) {
    e.preventDefault();
    return;
  }

  // LGPD: verificar consentimento
  if (!document.getElementById('consent').checked) {
    e.preventDefault();
    alert('É necessário concordar com a política de privacidade para enviar a indicação.');
    return;
  }

  e.preventDefault();

  const data = new FormData(this);
  fetch('https://api.web3forms.com/submit', {
    method: 'POST',
    body: data
  }).then(res => res.json()).then(result => {
    if (result.success) {
      form.style.display = 'none';
      success.style.display = 'block';
    } else {
      alert('Erro ao enviar. Tente novamente.');
    }
  }).catch(() => {
    alert('Erro de conexão. Tente novamente.');
  });
});
</script>
</body>
</html>
